name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @milionerzy/shared build

      - name: Typecheck backend
        run: pnpm --filter @milionerzy/backend typecheck

      - name: Typecheck frontend
        run: pnpm --filter @milionerzy/frontend typecheck

      - name: Build frontend
        run: pnpm --filter @milionerzy/frontend build

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @milionerzy/shared build

      - name: Build frontend
        run: pnpm --filter @milionerzy/frontend build

      - name: Install Playwright Chromium
        run: pnpm --filter @milionerzy/frontend exec playwright install chromium --with-deps

      - name: Run e2e tests
        run: pnpm --filter @milionerzy/frontend test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/frontend/test-results/
          retention-days: 14
