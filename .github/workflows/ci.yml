name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @milionerzy/shared build

      - name: Typecheck backend
        run: pnpm --filter @milionerzy/backend typecheck

      - name: Typecheck frontend
        run: pnpm --filter @milionerzy/frontend typecheck

      - name: Build frontend
        run: pnpm --filter @milionerzy/frontend build
